<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Batch Assign — Coating Machine</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#070A0F;--surface:#0D1117;--card:#111820;
  --border:#1C2733;--borderLt:#2A3A4A;--text:#E8EDF2;--dim:#8899AA;--dimmer:#445566;
  --green:#10B981;--greenDk:#052E1A;--red:#EF4444;--redDk:#3F0A0A;
  --amber:#F59E0B;--amberDk:#451A00;--blue:#3B82F6;--blueDk:#0A1F40;
  --cyan:#06B6D4;--purple:#8B5CF6;--purpleDk:#2D1B69;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;--disp:'Bebas Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;}
.hdr{background:var(--surface);border-bottom:2px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#8B5CF6,#5B21B6);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:800;font-size:15px;color:#fff;flex-shrink:0;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.srv-dot{width:9px;height:9px;border-radius:50%;background:var(--dimmer);transition:all .3s;}
.srv-dot.ok{background:var(--green);box-shadow:0 0 10px var(--green);}
.srv-lbl{font-family:var(--mono);font-size:9px;color:var(--dim);}
.hdr-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-family:var(--mono);font-size:11px;color:var(--dim);cursor:pointer;}
.main{flex:1;overflow-y:auto;padding:20px;display:flex;gap:16px;max-width:1100px;margin:0 auto;width:100%;}
@media(max-width:800px){.main{flex-direction:column;}}
.col{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0;}
.card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:16px;}
.sec-lbl{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:2px;margin-bottom:8px;}
.inp{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-family:var(--mono);font-size:18px;font-weight:700;outline:none;text-align:center;}
.inp:focus{border-color:var(--purple);}
.sel{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-family:var(--mono);font-size:14px;font-weight:700;outline:none;}
.btn{width:100%;padding:16px;border-radius:12px;border:none;font-weight:800;font-size:16px;cursor:pointer;font-family:var(--sans);transition:all .15s;}
.btn:active{transform:scale(.98);}
.btn-purple{background:var(--purple);color:#fff;}
.btn-amber{background:var(--amber);color:#000;}
.btn-dim{background:var(--border);color:var(--dimmer);cursor:not-allowed;}
.badge{display:inline-block;font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;}
.tray-card{padding:10px 12px;background:var(--surface);border:2px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .15s;}
.tray-card:active{border-color:var(--purple);}
.tray-card.selected{border-color:var(--purple);background:var(--purpleDk);}
.tray-card.matched{border-color:var(--green);background:rgba(16,185,129,0.05);}
.tray-card .name{font-family:var(--mono);font-size:14px;font-weight:800;}
.tray-card .meta{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:3px;}
.batch-card{padding:12px;background:var(--surface);border:2px solid var(--border);border-radius:10px;margin-bottom:8px;}
.batch-card .name{font-family:var(--mono);font-size:16px;font-weight:800;color:var(--purple);}
.suggestion{padding:10px 12px;background:rgba(16,185,129,0.04);border:1px solid rgba(16,185,129,0.2);border-radius:8px;margin-bottom:6px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:10px;font-family:var(--mono);font-size:13px;font-weight:700;z-index:999;animation:fadeUp .2s ease;}
.toast.ok{background:var(--greenDk);color:var(--green);border:1px solid var(--green);}
.toast.err{background:var(--redDk);color:var(--red);border:1px solid var(--red);}
.toast.warn{background:var(--amberDk);color:var(--amber);border:1px solid var(--amber);}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:400px;}
.m-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;margin-bottom:10px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">BA</div>
  <div>
    <div style="font-family:var(--disp);font-size:28px;letter-spacing:1px;" id="machineLabel">COATING MACHINE</div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:2px;">BATCH ASSIGN — LOAD CLOSED TRAYS → COATING BATCH</div>
  </div>
  <div class="hdr-right">
    <div style="display:flex;align-items:center;gap:5px;"><div class="srv-dot" id="srvDot"></div><span class="srv-lbl" id="srvLbl">OFFLINE</span></div>
    <button class="hdr-btn" onclick="openSetup()">⚙ SETUP</button>
  </div>
</div>
<div class="main" id="app"></div>
<div id="toastZone"></div>
<div id="modalZone"></div>

<script>
const K={CFG:'ba_cfg'};
function lsGet(k,d){try{return JSON.parse(localStorage.getItem(k))||d;}catch{return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
let cfg=lsGet(K.CFG,{});
let serverUrl=cfg.serverUrl||'http://localhost:3002';
let operator=cfg.operator||'';
let machineId=cfg.machineId||'EB9 #1';
let serverOk=false;
function persistCfg(){lsSet(K.CFG,{serverUrl,operator,machineId});}

let closedTrays=[];
let activeBatches=[];
let suggestions=[];
let selectedTrays=new Set();
let batchIdInput='';
let coatingType='AR';

async function checkServer(){
  const dot=document.getElementById('srvDot'),lbl=document.getElementById('srvLbl');
  try{const r=await fetch(`${serverUrl}/health`,{signal:AbortSignal.timeout(2500)});serverOk=r.ok;}catch{serverOk=false;}
  dot.className=`srv-dot ${serverOk?'ok':''}`;
  lbl.textContent=serverOk?serverUrl.replace(/https?:\/\//,'').split('/')[0].slice(0,22):'OFFLINE';
}
setInterval(checkServer,10000);checkServer();

function toast(msg,type='ok'){
  const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;
  document.getElementById('toastZone').appendChild(el);setTimeout(()=>el.remove(),4000);
}

function coatingColor(ct){const m={'AR':'#3b82f6','Blue Cut':'#06b6d4','Mirror':'#a855f7','Transitions':'#f97316','Polarized':'#ec4899','Hard Coat':'#84cc16'};return m[ct]||'var(--dim)';}
function coatingBg(ct){const m={'AR':'#1e3a5f','Blue Cut':'#164e63','Mirror':'#581c87','Transitions':'#7c2d12','Polarized':'#831843','Hard Coat':'#365314'};return m[ct]||'var(--surface)';}

async function fetchData(){
  if(!serverOk)return;
  try{
    const [cRes,iRes]=await Promise.all([
      fetch(`${serverUrl}/api/containers/active`),
      fetch(`${serverUrl}/api/coating/intelligence`).catch(()=>null),
    ]);
    if(cRes.ok){
      const d=await cRes.json();
      closedTrays=(d.oven_trays||[]).filter(t=>t.status==='closed');
      activeBatches=(d.coating_batches||[]).filter(b=>b.status==='open');
    }
    if(iRes?.ok){
      const intel=await iRes.json();
      suggestions=(intel?.recommendation?.batchSuggestions||[]).filter(s=>s.ready);
    }
    render();
  }catch(e){console.error(e);}
}
setInterval(fetchData,10000);setTimeout(fetchData,1000);

function toggleTray(id){
  if(selectedTrays.has(id))selectedTrays.delete(id);else selectedTrays.add(id);
  render();
}

async function assignToBatch(){
  const bid=document.getElementById('inpBatchId')?.value.trim().toUpperCase()||batchIdInput;
  if(!bid){toast('Enter a batch ID','err');return;}
  if(selectedTrays.size===0){toast('Select trays to assign','err');return;}
  try{
    const r=await fetch(`${serverUrl}/api/containers/transfer/tray-to-batch`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({batch_id:bid,tray_ids:[...selectedTrays],machine_id:machineId,coating_type:coatingType,operator_id:operator||null})
    });
    const d=await r.json();
    if(r.ok){
      const rej=d.rejected?.length?` | ${d.rejected.length} rejected`:'';
      toast(`Assigned ${d.loaded?.length||0} trays → ${bid} on ${machineId}${rej}`,d.rejected?.length?'warn':'ok');
      selectedTrays.clear();batchIdInput='';fetchData();
    }else toast(d.error||'Failed','err');
  }catch(e){toast(e.message,'err');}
}

function render(){
  const app=document.getElementById('app');
  document.getElementById('machineLabel').textContent=machineId;

  // Match trays to suggestions
  const matchedTrays=new Map();
  for(const s of suggestions){
    closedTrays.filter(t=>t.coating_type===s.coatingType&&t.material===s.material)
      .forEach(t=>matchedTrays.set(t.id,s));
  }

  // Group closed trays by coating::material
  const groups={};
  closedTrays.forEach(t=>{
    const k=`${t.coating_type||'?'}::${t.material||'?'}`;
    if(!groups[k])groups[k]={coating:t.coating_type,material:t.material,trays:[]};
    groups[k].trays.push(t);
  });

  const traysHtml=Object.entries(groups).map(([k,g])=>`
    <div style="margin-bottom:14px;">
      <div style="display:flex;gap:4px;align-items:center;margin-bottom:6px;">
        ${g.coating?`<span class="badge" style="background:${coatingBg(g.coating)};color:${coatingColor(g.coating)}">${g.coating}</span>`:''}
        ${g.material?`<span class="badge" style="background:#1e293b;color:#cbd5e1;border:1px solid #334155">${g.material}</span>`:''}
        <span style="font-family:var(--mono);font-size:9px;color:var(--dim);margin-left:4px;">${g.trays.length} trays</span>
      </div>
      ${g.trays.map(t=>{
        const matched=matchedTrays.get(t.id);
        return`
        <div class="tray-card ${selectedTrays.has(t.id)?'selected':''} ${matched&&!selectedTrays.has(t.id)?'matched':''}" onclick="toggleTray('${t.id}')">
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:18px;height:18px;border-radius:4px;border:2px solid ${selectedTrays.has(t.id)?'var(--purple)':'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--purple);flex-shrink:0;">${selectedTrays.has(t.id)?'✓':''}</div>
            <span class="name">${t.id}</span>
            <span style="font-family:var(--mono);font-size:11px;color:var(--dim);margin-left:auto;">${t.job_count} jobs</span>
          </div>
          ${matched?`<div style="font-family:var(--mono);font-size:9px;color:var(--green);margin-top:4px;padding-left:26px;">READY — ${matched.fillPct}% fill, ${matched.suggestedCoater}</div>`:''}
        </div>`;
      }).join('')}
    </div>`).join('')||'<div style="text-align:center;color:var(--dimmer);padding:30px;font-family:var(--mono);font-size:11px;">No closed trays available</div>';

  const batchesHtml=activeBatches.map(b=>`
    <div class="batch-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
        <span class="name">${b.id}</span>
        ${b.coating_type?`<span class="badge" style="background:${coatingBg(b.coating_type)};color:${coatingColor(b.coating_type)}">${b.coating_type}</span>`:''}
        ${b.material?`<span class="badge" style="background:#1e293b;color:#cbd5e1;border:1px solid #334155">${b.material}</span>`:''}
      </div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--dim);">
        ${b.job_count} jobs · ${b.machine||machineId} · ${(b.trays||[]).length} trays
      </div>
    </div>`).join('')||'<div style="text-align:center;color:var(--dimmer);padding:16px;font-family:var(--mono);font-size:11px;">No active batches</div>';

  const suggestionsHtml=suggestions.map(s=>`
    <div class="suggestion">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
        <span class="badge" style="background:${coatingBg(s.coatingType)};color:${coatingColor(s.coatingType)}">${s.coatingType}</span>
        <span class="badge" style="background:#1e293b;color:#cbd5e1;border:1px solid #334155">${s.material}</span>
        <span style="font-family:var(--mono);font-size:11px;color:var(--green);margin-left:auto;font-weight:700;">${s.fillPct}% FILL</span>
      </div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--dim);">
        ${s.jobCount} jobs · ${s.lensCount} lenses · ${s.rushCount} rush · ${s.suggestedCoater}
      </div>
    </div>`).join('')||'';

  app.innerHTML=`
    <div class="col">
      <div class="card">
        <div class="sec-lbl">CLOSED TRAYS — TAP TO SELECT</div>
        ${traysHtml}
      </div>
    </div>
    <div class="col">
      <div class="card" style="border-color:var(--purple);">
        <div class="sec-lbl">ASSIGN SELECTED → BATCH</div>
        <input class="inp" id="inpBatchId" placeholder="BATCH-042" value="${batchIdInput}" oninput="batchIdInput=this.value"
          onkeydown="if(event.key==='Enter')assignToBatch()"/>
        <div style="height:8px"></div>
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <select class="sel" style="flex:1;" onchange="coatingType=this.value">
            ${['AR','Blue Cut','Mirror','Transitions','Polarized','Hard Coat'].map(c=>`<option ${c===coatingType?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--dim);text-align:center;margin-bottom:8px;">
          ${selectedTrays.size} trays selected → ${machineId}
        </div>
        <button class="btn ${selectedTrays.size>0?'btn-purple':'btn-dim'}" onclick="assignToBatch()">
          ASSIGN ${selectedTrays.size} TRAYS → BATCH
        </button>
      </div>
      ${suggestionsHtml?`<div class="card"><div class="sec-lbl">BATCH SUGGESTIONS (READY)</div>${suggestionsHtml}</div>`:''}
      <div class="card">
        <div class="sec-lbl">ACTIVE BATCHES ON ${machineId}</div>
        ${batchesHtml}
      </div>
    </div>`;
}

function openSetup(){
  document.getElementById('modalZone').innerHTML=`
    <div class="modal-bg" onclick="closeSetup()"><div class="modal" onclick="event.stopPropagation()">
      <div class="sec-lbl">SETUP</div>
      <label style="font-family:var(--mono);font-size:9px;color:var(--dim);display:block;margin-bottom:4px;">MACHINE</label>
      <select class="m-inp" id="mMachine" style="padding:10px;">
        ${['EB9 #1','EB9 #2','E1400'].map(m=>`<option ${m===machineId?'selected':''}>${m}</option>`).join('')}
      </select>
      <label style="font-family:var(--mono);font-size:9px;color:var(--dim);display:block;margin-bottom:4px;">OPERATOR</label>
      <input class="m-inp" id="mOp" value="${operator}"/>
      <label style="font-family:var(--mono);font-size:9px;color:var(--dim);display:block;margin-bottom:4px;">SERVER URL</label>
      <input class="m-inp" id="mSrv" value="${serverUrl}"/>
      <button class="btn btn-purple" style="font-size:14px;padding:12px;" onclick="saveSetup()">Save</button>
    </div></div>`;
}
function closeSetup(){document.getElementById('modalZone').innerHTML='';}
function saveSetup(){
  machineId=document.getElementById('mMachine').value;
  operator=document.getElementById('mOp').value.trim();
  const srv=document.getElementById('mSrv').value.trim();
  if(srv)serverUrl=srv;
  persistCfg();closeSetup();checkServer();fetchData();toast('Setup saved');
}

render();
</script>
</body>
</html>
