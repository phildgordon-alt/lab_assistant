<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Coating Dashboard — Pair Eyewear</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#070A0F; --surface:#0D1117; --card:#111820;
  --border:#1C2733; --borderLt:#2A3A4A;
  --text:#E8EDF2; --dim:#8899AA; --dimmer:#445566;
  --blue:#3B82F6; --blueDk:#1E3A5F; --blue2:#2E5FA3;
  --green:#10B981; --greenDk:#052E1A;
  --amber:#F59E0B; --amberDk:#451A00;
  --red:#EF4444;   --redDk:#3F0A0A;
  --purple:#8B5CF6; --purpleDk:#2D1B69;
  --teal:#06B6D4; --tealDk:#0A2E38;
  --gold:#F59E0B; --silver:#94A3B8; --bronze:#B45309;
  --mono:'JetBrains Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --disp:'Bebas Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);}
body{display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
.hdr{background:var(--surface);border-bottom:2px solid var(--border);
  padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-brand{display:flex;align-items:center;gap:12px;}
.logo{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,#06B6D4,#0891B2);
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);
  font-weight:800;font-size:15px;color:#fff;}
.brand-name{font-family:var(--disp);font-size:28px;letter-spacing:1px;}
.brand-sub{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:2px;}
.hdr-right{display:flex;align-items:center;gap:16px;}
.date-badge{font-family:var(--mono);font-size:11px;color:var(--dim);}
.clock{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--teal);letter-spacing:3px;}
.srv-wrap{display:flex;align-items:center;gap:5px;cursor:pointer;}
.srv-dot{width:9px;height:9px;border-radius:50%;background:var(--dimmer);transition:all .3s;}
.srv-dot.ok{background:var(--green);box-shadow:0 0 8px var(--green);}
.srv-dot.mock{background:var(--amber);}
.srv-dot.err{background:var(--red);}
.srv-lbl{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:1px;}
.hdr-btn{background:transparent;border:1px solid var(--border);border-radius:7px;
  padding:7px 12px;font-family:var(--mono);font-size:10px;color:var(--dim);cursor:pointer;}
.hdr-btn:active{border-color:var(--teal);color:var(--teal);}

/* TABS */
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;gap:0;padding:0 20px;flex-shrink:0;}
.tab{padding:12px 20px;font-family:var(--mono);font-size:11px;font-weight:700;
  color:var(--dim);cursor:pointer;border-bottom:3px solid transparent;
  transition:all .15s;letter-spacing:.5px;-webkit-user-select:none;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;display:flex;flex-direction:column;gap:14px;}

/* KPI ROW */
.kpi-row{display:grid;gap:10px;grid-template-columns:repeat(5,1fr);}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr);}}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;display:flex;flex-direction:column;gap:4px;}
.kpi-val{font-family:var(--mono);font-size:30px;font-weight:800;line-height:1;}
.kpi-lbl{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;}
.kpi-sub{font-family:var(--mono);font-size:10px;color:var(--dimmer);margin-top:2px;}

/* GRID LAYOUTS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
@media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr;}}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.card-title{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--dim);
  letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.card-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 8px;
  border-radius:10px;background:var(--border);color:var(--dim);}

/* COATER CARDS */
.coater-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.coater-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;
  padding:16px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s;}
.coater-card:hover{border-color:var(--borderLt);}
.coater-card.active{border-color:var(--teal);}
.coater-top{display:flex;align-items:center;justify-content:space-between;}
.coater-name{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--teal);}
.coater-count{font-family:var(--mono);font-size:28px;font-weight:800;color:var(--text);line-height:1;}
.coater-count-lbl{font-family:var(--mono);font-size:9px;color:var(--dimmer);letter-spacing:1px;}
.coater-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cs-active{background:var(--teal);box-shadow:0 0 8px var(--teal);}
.cs-idle{background:var(--dimmer);}

/* COATING TYPE BARS */
.ct-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.ct-bar-label{font-family:var(--mono);font-size:10px;color:var(--dim);width:90px;text-align:right;flex-shrink:0;}
.ct-bar-wrap{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.ct-bar{height:100%;border-radius:4px;transition:width .5s;}
.ct-bar-val{font-family:var(--mono);font-size:10px;color:var(--dimmer);min-width:32px;text-align:right;flex-shrink:0;}

/* JOB QUEUE */
.queue-controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.q-sort-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;
  font-family:var(--mono);font-size:10px;color:var(--dim);cursor:pointer;transition:all .15s;}
.q-sort-btn.active{border-color:var(--teal);color:var(--teal);background:var(--tealDk);}
.queue-list{display:flex;flex-direction:column;gap:5px;max-height:calc(100vh - 240px);overflow-y:auto;}
.queue-row{display:flex;align-items:center;gap:10px;padding:9px 12px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;transition:all .15s;}
.queue-row.rush{border-color:var(--red);background:var(--redDk);}
.q-job{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--teal);min-width:72px;}
.q-rx{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:72px;}
.q-coating{font-family:var(--mono);font-size:10px;color:var(--purple);min-width:80px;}
.q-station{font-family:var(--mono);font-size:10px;color:var(--blue);min-width:60px;}
.q-operator{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:40px;text-align:center;}
.q-lens{font-family:var(--mono);font-size:9px;color:var(--dimmer);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.q-time{font-family:var(--mono);font-size:10px;color:var(--dimmer);min-width:48px;text-align:right;}
.q-days{font-family:var(--mono);font-size:9px;min-width:36px;text-align:right;}
.q-rush-badge{font-size:11px;margin-right:4px;}

/* OPERATOR CARDS */
.op-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.op-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;
  padding:16px;display:flex;flex-direction:column;gap:10px;}
.op-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:var(--mono);font-weight:800;font-size:16px;
  flex-shrink:0;color:#fff;}
.op-stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.op-stat{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:10px;text-align:center;}
.op-stat-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--teal);}
.op-stat-lbl{font-family:var(--mono);font-size:8px;color:var(--dimmer);letter-spacing:1px;margin-top:2px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:#00000090;z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--borderLt);border-radius:16px;
  padding:24px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:14px;}
.modal h3{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);letter-spacing:1px;}
.m-field label{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;
  display:block;margin-bottom:6px;}
.m-inp{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:8px;
  padding:11px 14px;color:var(--text);font-family:var(--mono);font-size:14px;outline:none;
  -webkit-appearance:none;}
.m-inp:focus{border-color:var(--teal);}
.m-sel{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:8px;
  padding:11px 14px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;
  -webkit-appearance:none;}
.m-sel:focus{border-color:var(--teal);}
.m-btns{display:flex;gap:8px;}
.m-btns button{flex:1;padding:12px;border-radius:8px;border:none;
  font-weight:700;font-size:14px;cursor:pointer;font-family:var(--sans);}

/* TOAST */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:300;pointer-events:none;}
.toast{background:#1A2540;border:1px solid var(--borderLt);border-radius:10px;
  padding:10px 20px;font-family:var(--mono);font-size:13px;color:var(--text);
  box-shadow:0 4px 24px #00000060;white-space:nowrap;}
.toast.ok{border-color:var(--teal);color:var(--teal);}
.toast.warn{border-color:var(--amber);color:var(--amber);}

/* PIE CHART (CSS-only) */
.pie-wrap{display:flex;align-items:center;gap:20px;}
.pie-legend{display:flex;flex-direction:column;gap:5px;}
.pie-leg-row{display:flex;align-items:center;gap:6px;}
.pie-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.pie-leg-lbl{font-family:var(--mono);font-size:10px;color:var(--dim);}
.pie-leg-val{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text);margin-left:auto;min-width:28px;text-align:right;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <div class="logo">CT</div>
    <div>
      <div class="brand-name">COATING DASHBOARD</div>
      <div class="brand-sub">LAB_ASSISTANT · PAIR EYEWEAR · COATING ZONE</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="date-badge" id="dateBadge"></div>
    <div class="srv-wrap" onclick="manualSync()" title="Click to refresh data">
      <div class="srv-dot" id="srvDot"></div>
      <span class="srv-lbl" id="srvLbl">SERVER</span>
    </div>
    <div class="clock" id="clock">--:--:--</div>
    <button class="hdr-btn" onclick="openSetup()">⚙ SETUP</button>
    <button class="hdr-btn" onclick="window.location.href='/'" title="Back to dashboards">◂ HOME</button>
  </div>
</div>

<!-- TABS -->
<div class="tab-bar">
  <div class="tab active" id="tab-pipeline" onclick="switchTab('pipeline')">⚡ PIPELINE</div>
  <div class="tab"        id="tab-queue"    onclick="switchTab('queue')">📋 JOB QUEUE</div>
  <div class="tab"        id="tab-ops"      onclick="switchTab('ops')">👤 OPERATORS</div>
</div>

<div class="main" id="main"></div>
<div class="toast-wrap" id="toastWrap"></div>

<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <h3 id="mTitle"></h3>
    <div id="mBody"></div>
    <div class="m-btns" id="mBtns"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// CONFIG & STATE
// ─────────────────────────────────────────────────────────────────
let cfg = JSON.parse(localStorage.getItem('coat_cfg') || '{}');
let serverUrl = cfg.serverUrl || 'http://localhost:3002';
let shiftStart = cfg.shiftStart || '07:00';

const COATING_COLORS = {
  'AR':         '#06B6D4',
  'BLUE_CUT':   '#3B82F6',
  'HARD_COAT':  '#10B981',
  'MIRROR':     '#8B5CF6',
  'POLARIZED':  '#F59E0B',
  'TRANSITIONS':'#EC4899',
  'UV':         '#84CC16',
  'ANTI_FOG':   '#F97316',
  'NONE':       '#445566',
};
const AVATAR_COLORS = [
  '#06B6D4','#3B82F6','#10B981','#F59E0B','#EF4444',
  '#EC4899','#8B5CF6','#84CC16','#F97316','#A78BFA',
];

// Dashboard data from server
let dashData = null;
let dataMode = 'offline';
let lastSync = null;
let activeTab = 'pipeline';
let queueSort = 'station'; // station | coating | wait | rush

// ─────────────────────────────────────────────────────────────────
// CLOCK + DATE
// ─────────────────────────────────────────────────────────────────
function tickClock(){
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  document.getElementById('dateBadge').textContent = now.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
}
setInterval(tickClock,1000); tickClock();

// ─────────────────────────────────────────────────────────────────
// DATA FETCH
// ─────────────────────────────────────────────────────────────────
async function fetchData(){
  try{
    const resp = await fetch(`${serverUrl}/api/coating/dashboard`, {
      signal: AbortSignal.timeout(8000)
    });
    if(resp.ok){
      dashData = await resp.json();
      dataMode = 'live';
      lastSync = new Date();
      updateSrvDot('ok','LIVE');
      return;
    }
  } catch(e){ console.warn('Coating dashboard fetch failed:', e.message); }
  // Generate mock data if server unavailable
  dashData = generateMock();
  dataMode = 'mock';
  lastSync = new Date();
  updateSrvDot('mock','MOCK DATA');
}

function generateMock(){
  const coatingTypes = ['AR','BLUE_CUT','HARD_COAT','MIRROR','POLARIZED','TRANSITIONS'];
  const coaters = ['CCL 1','CCL 2','CCL 3'];
  const operators = ['EY','DB','AF','MR','JL','KT'];
  const lensStyles = ['Progressive','Single Vision','Bifocal'];
  const lensMats = ['CR-39','Polycarbonate','Trivex','Hi-Index 1.67'];
  const stations = ['CCL 1','CCL 2','CCL 3','QUEUE','PREP'];

  function rInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  const jobs = [];
  for(let i=0;i<80;i++){
    jobs.push({
      id: 'J' + (21000 + i),
      tray: 'T-' + String(rInt(1,200)).padStart(3,'0'),
      station: pick(stations),
      operator: pick(operators),
      coating: pick(coatingTypes),
      lensStyle: pick(lensStyles),
      lensMat: pick(lensMats),
      rxNum: 'RX' + rInt(100000,999999),
      isRush: Math.random() < 0.12,
      minutesAtStation: rInt(2,180),
      daysInLab: rInt(0,5),
    });
  }

  const byCoater = {};
  coaters.forEach(c => {
    const cJobs = jobs.filter(j => j.station === c);
    byCoater[c] = { station: c, count: cJobs.length, jobs: cJobs };
  });

  const byCoatingType = {};
  coatingTypes.forEach(ct => {
    byCoatingType[ct] = jobs.filter(j => j.coating === ct).length;
  });

  const operatorStats = {};
  operators.forEach(op => {
    const opJobs = jobs.filter(j => j.operator === op);
    operatorStats[op] = { initials: op, jobs: opJobs.length };
  });

  return {
    jobs,
    coatingWip: 568,
    queueCount: 200,
    activeCount: 368,
    completedToday: 150,
    byCoater,
    byCoatingType,
    operatorStats,
    totalWip: 3000,
    shippedToday: 400,
  };
}

async function manualSync(){
  updateSrvDot('pending','SYNCING...');
  await fetchData();
  render();
  toast('Data refreshed','ok');
}

function updateSrvDot(state, label){
  const dot = document.getElementById('srvDot');
  const lbl = document.getElementById('srvLbl');
  dot.className = 'srv-dot ' + (state==='ok'?'ok':state==='mock'?'mock':'err');
  lbl.textContent = label;
}

// ─────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function shiftHours(){
  const [h,m] = shiftStart.split(':').map(Number);
  const start = new Date();
  start.setHours(h,m,0,0);
  return Math.max(0,(Date.now()-start)/3600000);
}

function pickColor(name){
  let hash = 0;
  for(const c of String(name)) hash = (hash*31 + c.charCodeAt(0)) & 0xFFFFFF;
  return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
}

function initials(name){
  return String(name||'').split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2);
}

function coatingColor(type){
  return COATING_COLORS[type] || COATING_COLORS[String(type).toUpperCase()] || '#445566';
}

function formatCoatingName(type){
  if(!type) return '—';
  return String(type).replace(/_/g,' ');
}

function fmtMinutes(m){
  if(m==null) return '—';
  if(m < 60) return m + 'm';
  const h = Math.floor(m/60);
  const rm = m % 60;
  return h + 'h' + (rm ? ' '+rm+'m' : '');
}

function daysColor(d){
  if(d >= 4) return 'var(--red)';
  if(d >= 2) return 'var(--amber)';
  return 'var(--dimmer)';
}

// ─────────────────────────────────────────────────────────────────
// TAB SWITCH
// ─────────────────────────────────────────────────────────────────
function switchTab(tab){
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');
  render();
}

// ─────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────
function render(){
  const main = document.getElementById('main');
  if(!dashData){ main.innerHTML = '<div style="text-align:center;padding:60px;font-family:var(--mono);color:var(--dimmer);">Loading data...</div>'; return; }
  if(activeTab==='pipeline') main.innerHTML = renderPipeline();
  if(activeTab==='queue')    main.innerHTML = renderQueue();
  if(activeTab==='ops')      main.innerHTML = renderOperators();
}

// ─── PIPELINE TAB ────────────────────────────────────────────────
function renderPipeline(){
  const d = dashData;
  const shiftH = shiftHours();
  const rate = shiftH > 0 ? (d.completedToday / shiftH).toFixed(1) : '—';

  const kpis = `
  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-val" style="color:var(--amber)">${d.queueCount}</div>
      <div class="kpi-lbl">QUEUE</div>
      <div class="kpi-sub">Waiting for coater</div>
    </div>
    <div class="kpi">
      <div class="kpi-val" style="color:var(--teal)">${d.activeCount}</div>
      <div class="kpi-lbl">IN COATER</div>
      <div class="kpi-sub">${d.coatingWip} coating WIP</div>
    </div>
    <div class="kpi">
      <div class="kpi-val" style="color:var(--green)">${d.completedToday}</div>
      <div class="kpi-lbl">DONE TODAY</div>
      <div class="kpi-sub">${rate}/hr avg</div>
    </div>
    <div class="kpi">
      <div class="kpi-val" style="color:var(--blue)">${d.totalWip}</div>
      <div class="kpi-lbl">TOTAL WIP</div>
    </div>
    <div class="kpi">
      <div class="kpi-val" style="color:var(--purple)">${d.shippedToday}</div>
      <div class="kpi-lbl">SHIPPED TODAY</div>
    </div>
  </div>`;

  // Coater cards
  const byCoater = d.byCoater || {};
  const coaterNames = Object.keys(byCoater).sort();
  const coaterCards = coaterNames.map(name => {
    const c = byCoater[name];
    const count = c.count || 0;
    const isActive = count > 0;
    // Mini breakdown by coating type for this coater
    const typeCounts = {};
    (c.jobs || []).forEach(j => {
      const ct = j.coating || 'UNKNOWN';
      typeCounts[ct] = (typeCounts[ct] || 0) + 1;
    });
    const miniBreakdown = Object.entries(typeCounts)
      .sort((a,b) => b[1]-a[1])
      .slice(0,4)
      .map(([ct,cnt]) => `<span style="display:inline-flex;align-items:center;gap:3px;margin-right:8px;"><span style="width:6px;height:6px;border-radius:2px;background:${coatingColor(ct)};display:inline-block;"></span><span style="font-family:var(--mono);font-size:9px;color:var(--dim);">${formatCoatingName(ct)} ${cnt}</span></span>`)
      .join('');

    return `
    <div class="coater-card ${isActive?'active':''}">
      <div class="coater-top">
        <div>
          <div class="coater-name">${esc(name)}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--dimmer);">${esc(c.station || name)}</div>
        </div>
        <div class="coater-status-dot ${isActive?'cs-active':'cs-idle'}"></div>
      </div>
      <div style="display:flex;align-items:baseline;gap:6px;">
        <div class="coater-count">${count}</div>
        <div class="coater-count-lbl">ACTIVE JOBS</div>
      </div>
      <div style="min-height:18px;">${miniBreakdown || '<span style="font-family:var(--mono);font-size:9px;color:var(--dimmer);">No jobs</span>'}</div>
    </div>`;
  }).join('');

  // Coating type breakdown bars
  const byType = d.byCoatingType || {};
  const typeEntries = Object.entries(byType).sort((a,b) => b[1]-a[1]);
  const maxTypeCount = Math.max(1, ...typeEntries.map(e => e[1]));
  const typeBars = typeEntries.map(([ct,cnt]) => {
    const pct = Math.round((cnt / maxTypeCount) * 100);
    const color = coatingColor(ct);
    return `
    <div class="ct-bar-row">
      <div class="ct-bar-label">${formatCoatingName(ct)}</div>
      <div class="ct-bar-wrap"><div class="ct-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="ct-bar-val">${cnt}</div>
    </div>`;
  }).join('');

  // Pie chart via SVG
  const pieSize = 140;
  const pieR = 55;
  const pieCx = pieSize/2;
  const pieCy = pieSize/2;
  const totalForPie = typeEntries.reduce((s,e) => s+e[1], 0) || 1;
  let pieAngle = -90;
  const pieSlices = typeEntries.map(([ct,cnt]) => {
    const sliceAngle = (cnt / totalForPie) * 360;
    const startRad = pieAngle * Math.PI / 180;
    const endRad = (pieAngle + sliceAngle) * Math.PI / 180;
    const x1 = pieCx + pieR * Math.cos(startRad);
    const y1 = pieCy + pieR * Math.sin(startRad);
    const x2 = pieCx + pieR * Math.cos(endRad);
    const y2 = pieCy + pieR * Math.sin(endRad);
    const largeArc = sliceAngle > 180 ? 1 : 0;
    const path = `M${pieCx},${pieCy} L${x1},${y1} A${pieR},${pieR} 0 ${largeArc} 1 ${x2},${y2} Z`;
    pieAngle += sliceAngle;
    return `<path d="${path}" fill="${coatingColor(ct)}" stroke="var(--card)" stroke-width="1.5"/>`;
  }).join('');

  const pieLegend = typeEntries.map(([ct,cnt]) => {
    const pct = Math.round((cnt / totalForPie) * 100);
    return `<div class="pie-leg-row">
      <div class="pie-dot" style="background:${coatingColor(ct)}"></div>
      <div class="pie-leg-lbl">${formatCoatingName(ct)}</div>
      <div class="pie-leg-val">${cnt} <span style="color:var(--dimmer);font-size:9px;">(${pct}%)</span></div>
    </div>`;
  }).join('');

  const lastSyncStr = lastSync ? `Last sync: ${lastSync.toLocaleTimeString()}` : 'Not synced';

  return `
  ${kpis}
  <div class="card">
    <div class="card-title">
      COATERS
      <span style="font-family:var(--mono);font-size:9px;color:var(--dimmer);">${lastSyncStr} · ${dataMode.toUpperCase()}</span>
    </div>
    <div class="coater-grid">${coaterCards || '<div style="font-family:var(--mono);color:var(--dimmer);padding:20px;text-align:center;">No coater data</div>'}</div>
  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-title">COATING TYPE DISTRIBUTION</div>
      <div class="pie-wrap">
        <svg width="${pieSize}" height="${pieSize}" viewBox="0 0 ${pieSize} ${pieSize}">
          ${typeEntries.length > 0 ? pieSlices : `<circle cx="${pieCx}" cy="${pieCy}" r="${pieR}" fill="var(--border)"/>`}
        </svg>
        <div class="pie-legend">${pieLegend || '<div style="font-family:var(--mono);font-size:10px;color:var(--dimmer);">No data</div>'}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">COATING TYPE BREAKDOWN <span class="card-badge">${typeEntries.length} TYPES</span></div>
      ${typeBars || '<div style="font-family:var(--mono);color:var(--dimmer);padding:20px;text-align:center;">No data</div>'}
    </div>
  </div>`;
}

// ─── JOB QUEUE TAB ───────────────────────────────────────────────
function setQueueSort(s){ queueSort = s; render(); }

function renderQueue(){
  const d = dashData;
  let allJobs = (d.jobs || []).slice();

  // Sort
  if(queueSort === 'station'){
    allJobs.sort((a,b) => String(a.station||'').localeCompare(String(b.station||'')));
  } else if(queueSort === 'coating'){
    allJobs.sort((a,b) => String(a.coating||'').localeCompare(String(b.coating||'')));
  } else if(queueSort === 'wait'){
    allJobs.sort((a,b) => (b.minutesAtStation||0) - (a.minutesAtStation||0));
  } else if(queueSort === 'rush'){
    allJobs.sort((a,b) => {
      if(a.isRush && !b.isRush) return -1;
      if(!a.isRush && b.isRush) return 1;
      return (b.minutesAtStation||0) - (a.minutesAtStation||0);
    });
  }

  const rushCount = allJobs.filter(j => j.isRush).length;

  const controls = `
  <div class="queue-controls">
    <button class="q-sort-btn ${queueSort==='station'?'active':''}" onclick="setQueueSort('station')">BY STATION</button>
    <button class="q-sort-btn ${queueSort==='coating'?'active':''}" onclick="setQueueSort('coating')">BY COATING</button>
    <button class="q-sort-btn ${queueSort==='wait'?'active':''}" onclick="setQueueSort('wait')">BY WAIT TIME</button>
    <button class="q-sort-btn ${queueSort==='rush'?'active':''}" onclick="setQueueSort('rush')">RUSH FIRST</button>
    <span style="font-family:var(--mono);font-size:10px;color:var(--dimmer);display:flex;align-items:center;margin-left:auto;">${allJobs.length} JOBS${rushCount > 0 ? ' · <span style="color:var(--red);margin-left:4px;">'+rushCount+' RUSH</span>' : ''}</span>
  </div>`;

  const header = `
  <div style="display:flex;align-items:center;gap:10px;padding:6px 12px;border-bottom:1px solid var(--border);margin-bottom:4px;">
    <div style="font-family:var(--mono);font-size:9px;color:var(--dimmer);min-width:72px;">JOB</div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--dimmer);min-width:72px;">RX</div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--dimmer);min-width:80px;">COATING</div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--dimmer);min-width:60px;">STATION</div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--dimmer);min-width:40px;text-align:center;">OP</div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--dimmer);flex:1;">LENS</div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--dimmer);min-width:48px;text-align:right;">TIME</div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--dimmer);min-width:36px;text-align:right;">DAYS</div>
  </div>`;

  const rows = allJobs.map(j => {
    const isRush = j.isRush;
    const lensInfo = [j.lensMat, j.lensStyle].filter(Boolean).join(' ');
    return `
    <div class="queue-row ${isRush?'rush':''}">
      <div class="q-job">${isRush?'<span class="q-rush-badge">🚨</span>':''}${esc(j.id)}</div>
      <div class="q-rx">${esc(j.rxNum || '')}</div>
      <div class="q-coating" style="color:${coatingColor(j.coating)}">${esc(formatCoatingName(j.coating))}</div>
      <div class="q-station">${esc(j.station || '—')}</div>
      <div class="q-operator">${esc(j.operator || '—')}</div>
      <div class="q-lens">${esc(lensInfo || '—')}</div>
      <div class="q-time">${fmtMinutes(j.minutesAtStation)}</div>
      <div class="q-days" style="color:${daysColor(j.daysInLab)}">${j.daysInLab != null ? j.daysInLab + 'd' : '—'}</div>
    </div>`;
  }).join('');

  return `
  <div class="card">
    <div class="card-title">COATING JOB QUEUE <span class="card-badge">${allJobs.length} TOTAL</span></div>
    ${controls}
    ${header}
    <div class="queue-list">${rows || '<div style="padding:40px;text-align:center;font-family:var(--mono);color:var(--dimmer);">No jobs in queue</div>'}</div>
  </div>`;
}

// ─── OPERATORS TAB ───────────────────────────────────────────────
function renderOperators(){
  const d = dashData;
  const opStats = d.operatorStats || {};
  const opEntries = Object.entries(opStats).sort((a,b) => (b[1].jobs||0) - (a[1].jobs||0));
  const maxJobs = Math.max(1, ...opEntries.map(e => e[1].jobs || 0));
  const shiftH = shiftHours();

  // Also compute per-operator coating type breakdown from jobs
  const opCoatingBreakdown = {};
  (d.jobs || []).forEach(j => {
    if(!j.operator) return;
    if(!opCoatingBreakdown[j.operator]) opCoatingBreakdown[j.operator] = {};
    const ct = j.coating || 'UNKNOWN';
    opCoatingBreakdown[j.operator][ct] = (opCoatingBreakdown[j.operator][ct] || 0) + 1;
  });

  const cards = opEntries.map(([init, stats]) => {
    const jobCount = stats.jobs || 0;
    const jph = shiftH > 0 ? (jobCount / shiftH).toFixed(1) : '—';
    const pct = Math.round((jobCount / maxJobs) * 100);
    const color = pickColor(init);
    const displayName = stats.initials || init;

    // Coating breakdown for this operator
    const breakdown = opCoatingBreakdown[init] || {};
    const breakdownEntries = Object.entries(breakdown).sort((a,b) => b[1]-a[1]);
    const breakdownHtml = breakdownEntries.slice(0,5).map(([ct,cnt]) =>
      `<span style="display:inline-flex;align-items:center;gap:3px;margin-right:8px;margin-bottom:2px;">
        <span style="width:6px;height:6px;border-radius:2px;background:${coatingColor(ct)};display:inline-block;"></span>
        <span style="font-family:var(--mono);font-size:9px;color:var(--dim);">${formatCoatingName(ct)} ${cnt}</span>
      </span>`
    ).join('');

    // Count rush jobs for this operator
    const rushCount = (d.jobs || []).filter(j => j.operator === init && j.isRush).length;

    return `
    <div class="op-card">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="op-avatar" style="background:${color}">${esc(displayName).slice(0,2)}</div>
        <div style="flex:1">
          <div style="font-family:var(--sans);font-size:16px;font-weight:700;">${esc(displayName)}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--dim);">COATING OPERATOR</div>
        </div>
      </div>
      <div class="op-stat-row">
        <div class="op-stat"><div class="op-stat-val">${jobCount}</div><div class="op-stat-lbl">JOBS TODAY</div></div>
        <div class="op-stat"><div class="op-stat-val">${jph}</div><div class="op-stat-lbl">JOBS / HR</div></div>
      </div>
      <div class="op-stat-row">
        <div class="op-stat"><div class="op-stat-val" style="color:var(--red)">${rushCount}</div><div class="op-stat-lbl">RUSH</div></div>
        <div class="op-stat"><div class="op-stat-val" style="color:var(--purple)">${breakdownEntries.length}</div><div class="op-stat-lbl">COAT TYPES</div></div>
      </div>
      <div style="margin-top:4px;">
        <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dimmer);margin-bottom:4px;">
          <span>DAILY PROGRESS</span><span>${pct}%</span>
        </div>
        <div style="width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden;">
          <div style="height:100%;border-radius:2px;background:${color};width:${pct}%;transition:width .5s;"></div>
        </div>
      </div>
      <div style="margin-top:6px;min-height:18px;display:flex;flex-wrap:wrap;">${breakdownHtml || '<span style="font-family:var(--mono);font-size:9px;color:var(--dimmer);">No breakdown</span>'}</div>
    </div>`;
  }).join('');

  const totalOps = opEntries.length;
  const totalJobsToday = opEntries.reduce((s,e) => s + (e[1].jobs||0), 0);

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
    <div style="font-family:var(--mono);font-size:10px;color:var(--dim);">${totalOps} OPERATORS · ${totalJobsToday} JOBS THIS SHIFT (${shiftH.toFixed(1)}H)</div>
  </div>
  <div class="op-grid">${cards || '<div style="grid-column:1/-1;text-align:center;padding:40px;font-family:var(--mono);color:var(--dimmer);">No operator data available</div>'}</div>`;
}

// ─────────────────────────────────────────────────────────────────
// SETUP MODAL
// ─────────────────────────────────────────────────────────────────
function openSetup(){
  document.getElementById('mTitle').textContent = 'DASHBOARD SETUP';
  document.getElementById('mBody').innerHTML = `
    <div class="m-field">
      <label>LAB_ASSISTANT SERVER URL</label>
      <input class="m-inp" id="s-srv" value="${esc(serverUrl)}" placeholder="http://192.168.x.x:3002"/>
    </div>
    <div class="m-field">
      <label>SHIFT START TIME</label>
      <input class="m-inp" id="s-shift" type="time" value="${esc(shiftStart)}"/>
    </div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--dimmer);padding:6px 0;">
      Server URL points to Lab_Assistant. All settings saved locally on this tablet.
      <br/>Polls GET /api/coating/dashboard every 120 seconds.
    </div>`;
  document.getElementById('mBtns').innerHTML=`
    <button style="background:var(--border);color:var(--dim);" onclick="closeModal()">Cancel</button>
    <button style="background:var(--teal);color:#000;" onclick="saveSetup()">Save</button>`;
  document.getElementById('modal').style.display='flex';
}

function saveSetup(){
  serverUrl  = document.getElementById('s-srv')?.value.trim() || serverUrl;
  shiftStart = document.getElementById('s-shift')?.value || shiftStart;
  cfg = {serverUrl, shiftStart};
  localStorage.setItem('coat_cfg', JSON.stringify(cfg));
  closeModal(); fetchData().then(render); toast('Settings saved — refreshing data','ok');
}

function closeModal(){document.getElementById('modal').style.display='none';}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

function toast(msg,type=''){
  const wrap=document.getElementById('toastWrap');
  const el=document.createElement('div');
  el.className=`toast ${type}`; el.textContent=msg;
  wrap.innerHTML=''; wrap.appendChild(el);
  setTimeout(()=>el.style.opacity='0',2800);
  setTimeout(()=>el.remove(),3100);
}

// ─────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────
fetchData().then(()=>{ render(); });
// Auto-refresh every 120 seconds
setInterval(()=>fetchData().then(render), 120000);
</script>
</body>
