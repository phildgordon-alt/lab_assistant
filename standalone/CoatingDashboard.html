<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Coating Dashboard — Pair Eyewear</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#070A0F; --surface:#0D1117; --card:#111820;
  --border:#1C2733; --borderLt:#2A3A4A;
  --text:#E8EDF2; --dim:#8899AA; --dimmer:#445566;
  --blue:#3B82F6; --blueDk:#1E3A5F; --blue2:#2E5FA3;
  --green:#10B981; --greenDk:#052E1A;
  --amber:#F59E0B; --amberDk:#451A00;
  --red:#EF4444;   --redDk:#3F0A0A;
  --purple:#8B5CF6; --purpleDk:#2D1B69;
  --teal:#06B6D4; --tealDk:#0A2E38;
  --gold:#F59E0B; --silver:#94A3B8; --bronze:#B45309;
  --mono:'JetBrains Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --disp:'Bebas Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);}
body{display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
.hdr{background:var(--surface);border-bottom:2px solid var(--border);
  padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-brand{display:flex;align-items:center;gap:12px;}
.logo{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,#06B6D4,#0891B2);
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);
  font-weight:800;font-size:14px;color:#fff;}
.brand-name{font-family:var(--disp);font-size:28px;letter-spacing:1px;}
.brand-sub{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:2px;}
.hdr-right{display:flex;align-items:center;gap:16px;}
.date-badge{font-family:var(--mono);font-size:11px;color:var(--dim);}
.clock{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--teal);letter-spacing:3px;}
.srv-wrap{display:flex;align-items:center;gap:5px;cursor:pointer;}
.srv-dot{width:9px;height:9px;border-radius:50%;background:var(--dimmer);transition:all .3s;}
.srv-dot.ok{background:var(--green);box-shadow:0 0 8px var(--green);}
.srv-dot.err{background:var(--red);}
.srv-lbl{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:1px;}
.hdr-btn{background:transparent;border:1px solid var(--border);border-radius:7px;
  padding:7px 12px;font-family:var(--mono);font-size:10px;color:var(--dim);cursor:pointer;}
.hdr-btn:active{border-color:var(--teal);color:var(--teal);}

/* TABS */
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;gap:0;padding:0 20px;flex-shrink:0;}
.tab{padding:12px 20px;font-family:var(--mono);font-size:11px;font-weight:700;
  color:var(--dim);cursor:pointer;border-bottom:3px solid transparent;
  transition:all .15s;letter-spacing:.5px;-webkit-user-select:none;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;display:flex;flex-direction:column;gap:14px;}

/* KPI ROW */
.kpi-row{display:grid;gap:10px;grid-template-columns:repeat(5,1fr);}
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;display:flex;flex-direction:column;gap:4px;}
.kpi-val{font-family:var(--mono);font-size:30px;font-weight:800;line-height:1;}
.kpi-lbl{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;}
.kpi-sub{font-family:var(--mono);font-size:10px;color:var(--dimmer);margin-top:2px;}

/* GRID LAYOUTS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
@media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr;}}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.card-title{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--dim);
  letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.card-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 8px;
  border-radius:10px;background:var(--border);color:var(--dim);}

/* ACTION BADGE */
.action-badge{font-family:var(--mono);font-size:11px;font-weight:800;padding:4px 12px;
  border-radius:8px;letter-spacing:1px;white-space:nowrap;}
.action-run-now{background:#052E1A;color:var(--green);border:1px solid var(--green);}
.action-wait{background:var(--amberDk);color:var(--amber);border:1px solid var(--amber);}
.action-run-partial{background:var(--blueDk);color:var(--blue);border:1px solid var(--blue);}

/* COATER CARDS */
.coater-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;
  padding:14px;display:flex;flex-direction:column;gap:8px;}
.coater-card.active{border-color:var(--teal);}
.coater-name{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text);}
.coater-cap{font-family:var(--mono);font-size:10px;color:var(--dim);}
.coater-fill-wrap{width:100%;height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.coater-fill{height:100%;border-radius:4px;transition:width .5s;background:var(--teal);}
.coater-fill.high{background:var(--green);}
.coater-fill.med{background:var(--amber);}
.coater-fill.low{background:var(--dimmer);}
.coater-stats{display:flex;gap:14px;}
.coater-stat{text-align:center;}
.coater-stat-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--teal);}
.coater-stat-lbl{font-family:var(--mono);font-size:8px;color:var(--dimmer);letter-spacing:1px;}

/* OVEN RACK GRID */
.rack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.rack-tile{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.rack-tile.running{border-color:var(--teal);}
.rack-tile.paused{border-color:var(--amber);}
.rack-top{display:flex;align-items:center;justify-content:space-between;}
.rack-id{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text);}
.rack-state{font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 6px;
  border-radius:6px;letter-spacing:1px;}
.rack-state.running{background:var(--tealDk);color:var(--teal);}
.rack-state.paused{background:var(--amberDk);color:var(--amber);}
.rack-coating{font-family:var(--mono);font-size:10px;color:var(--dim);}
.rack-time{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);}
.rack-bar-wrap{width:100%;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.rack-bar{height:100%;border-radius:3px;transition:width .5s;background:var(--teal);}
.rack-bar.warn{background:var(--amber);}
.rack-bar.done{background:var(--green);}

/* COATING TYPE CHIPS */
.type-chips{display:flex;flex-wrap:wrap;gap:6px;}
.type-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:80px;}
.type-chip-name{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--teal);letter-spacing:1px;}
.type-chip-count{font-family:var(--mono);font-size:20px;font-weight:800;color:var(--text);}
.type-chip-lbl{font-family:var(--mono);font-size:8px;color:var(--dimmer);}

/* QUEUE LIST */
.queue-list{display:flex;flex-direction:column;gap:5px;}
.queue-row{display:flex;align-items:center;gap:10px;padding:9px 12px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;}
.queue-row.rush{border-color:var(--red);}
.q-job{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--teal);min-width:80px;}
.q-coating{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:70px;}
.q-material{font-family:var(--mono);font-size:10px;color:var(--purple);min-width:50px;}
.q-lens{font-family:var(--mono);font-size:10px;color:var(--dim);flex:1;}
.q-wait{font-family:var(--mono);font-size:10px;color:var(--amber);min-width:60px;text-align:right;}
.q-rush{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;
  border-radius:6px;background:var(--redDk);color:var(--red);letter-spacing:1px;}
.q-substage{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;
  border-radius:6px;letter-spacing:1px;}
.qs-queue{background:#1A2030;color:var(--dim);}
.qs-coater{background:var(--tealDk);color:var(--teal);}
.qs-oven{background:var(--amberDk);color:var(--amber);}
.qs-qc{background:var(--purpleDk);color:var(--purple);}

/* BATCH SUGGESTION CARDS */
.batch-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;
  padding:14px;display:flex;flex-direction:column;gap:8px;}
.batch-card.ready{border-color:var(--green);}
.batch-header{display:flex;align-items:center;justify-content:space-between;}
.batch-type{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--teal);}
.batch-material{font-family:var(--mono);font-size:11px;color:var(--purple);font-weight:700;}
.batch-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.batch-stat{text-align:center;background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:8px;}
.batch-stat-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--teal);}
.batch-stat-lbl{font-family:var(--mono);font-size:8px;color:var(--dimmer);letter-spacing:1px;margin-top:2px;}
.batch-coater{font-family:var(--mono);font-size:10px;color:var(--dim);}
.batch-fill-wrap{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.batch-fill{height:100%;border-radius:3px;background:var(--teal);transition:width .5s;}
.batch-fill.ready{background:var(--green);}
.batch-ready-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;
  border-radius:6px;background:var(--greenDk);color:var(--green);letter-spacing:1px;}
.batch-wait-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;
  border-radius:6px;background:#1A2030;color:var(--dim);letter-spacing:1px;}

/* SUMMARY BAR */
.summary-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:10px 16px;font-family:var(--mono);font-size:11px;color:var(--dim);line-height:1.5;}

/* EMPTY STATE */
.empty{text-align:center;padding:40px;font-family:var(--mono);font-size:12px;color:var(--dimmer);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:#00000090;z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--borderLt);border-radius:16px;
  padding:24px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:14px;}
.modal h3{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);letter-spacing:1px;}
.m-field label{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;
  display:block;margin-bottom:6px;}
.m-inp{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:8px;
  padding:11px 14px;color:var(--text);font-family:var(--mono);font-size:14px;outline:none;
  -webkit-appearance:none;}
.m-inp:focus{border-color:var(--teal);}
.m-btns{display:flex;gap:8px;}
.m-btns button{flex:1;padding:12px;border-radius:8px;border:none;
  font-weight:700;font-size:14px;cursor:pointer;font-family:var(--sans);}

/* TOAST */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:300;pointer-events:none;}
.toast{background:#1A2540;border:1px solid var(--borderLt);border-radius:10px;
  padding:10px 20px;font-family:var(--mono);font-size:13px;color:var(--text);
  box-shadow:0 4px 24px #00000060;white-space:nowrap;}
.toast.ok{border-color:var(--teal);color:var(--teal);}
.toast.warn{border-color:var(--amber);color:var(--amber);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <div class="logo">CT</div>
    <div>
      <div class="brand-name">COATING DASHBOARD</div>
      <div class="brand-sub">LAB_ASSISTANT · PAIR EYEWEAR · COATING INTELLIGENCE</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="date-badge" id="dateBadge"></div>
    <div class="srv-wrap" onclick="manualSync()" title="Click to refresh">
      <div class="srv-dot" id="srvDot"></div>
      <span class="srv-lbl" id="srvLbl">SERVER</span>
    </div>
    <div class="clock" id="clock">--:--:--</div>
    <button class="hdr-btn" onclick="openSetup()">&#9881; SETUP</button>
    <button class="hdr-btn" onclick="window.location.href='/'" title="Back to dashboards">&#9666; HOME</button>
  </div>
</div>

<!-- TABS -->
<div class="tab-bar">
  <div class="tab active" id="tab-pipeline" onclick="switchTab('pipeline')">PIPELINE</div>
  <div class="tab"        id="tab-queue"    onclick="switchTab('queue')">QUEUE</div>
  <div class="tab"        id="tab-batching" onclick="switchTab('batching')">BATCHING</div>
</div>

<div class="main" id="main"></div>
<div class="toast-wrap" id="toastWrap"></div>

<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <h3 id="mTitle"></h3>
    <div id="mBody"></div>
    <div class="m-btns" id="mBtns"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// CONFIG & STATE
// ─────────────────────────────────────────────────────────────────
let cfg = JSON.parse(localStorage.getItem('coat_cfg') || '{}');
let serverUrl = cfg.serverUrl || 'http://localhost:3002';

let currentTab = 'pipeline';
let intelData = null;   // /api/coating/intelligence response
let ovenData = null;    // /api/oven-live response
let srvOk = false;
let pollTimer = null;

// ─────────────────────────────────────────────────────────────────
// CLOCK
// ─────────────────────────────────────────────────────────────────
function tickClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = hh + ':' + mm + ':' + ss;
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('dateBadge').textContent =
    days[now.getDay()] + ' ' + months[now.getMonth()] + ' ' + now.getDate();
}
tickClock();
setInterval(tickClock, 1000);

// ─────────────────────────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  render();
}

// ─────────────────────────────────────────────────────────────────
// DATA FETCHING — 30 second poll
// ─────────────────────────────────────────────────────────────────
async function fetchAll() {
  try {
    const [intelRes, ovenRes] = await Promise.all([
      fetch(serverUrl + '/api/coating/intelligence'),
      fetch(serverUrl + '/api/oven-live'),
    ]);
    if (intelRes.ok) intelData = await intelRes.json();
    if (ovenRes.ok) ovenData = await ovenRes.json();
    srvOk = intelRes.ok;
    setSrvDot(srvOk ? 'ok' : 'err');
  } catch (e) {
    console.warn('[Coating] Fetch error:', e);
    srvOk = false;
    setSrvDot('err');
  }
  render();
}

function setSrvDot(state) {
  const dot = document.getElementById('srvDot');
  dot.className = 'srv-dot ' + state;
}

function manualSync() {
  showToast('Refreshing...', 'ok');
  fetchAll();
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  fetchAll();
  pollTimer = setInterval(fetchAll, 30000);
}

// ─────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTime(sec) {
  if (sec == null || sec < 0) return '--:--';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function fmtMin(min) {
  if (min == null) return '--';
  if (min < 60) return min + 'm';
  const h = Math.floor(min / 60);
  const m = min % 60;
  return h + 'h ' + m + 'm';
}

function actionClass(action) {
  if (!action) return 'action-wait';
  const a = action.toUpperCase();
  if (a === 'RUN NOW') return 'action-run-now';
  if (a === 'RUN PARTIAL') return 'action-run-partial';
  return 'action-wait';
}

function fillClass(pct) {
  if (pct >= 75) return 'high';
  if (pct >= 50) return 'med';
  return 'low';
}

function coatingColor(type) {
  const colors = {
    'AR': '#06B6D4', 'Blue Cut': '#3B82F6', 'Hard Coat': '#8B5CF6',
    'Mirror': '#F59E0B', 'Polarized': '#10B981', 'Transitions': '#EC4899',
  };
  return colors[type] || '#8899AA';
}

// ─────────────────────────────────────────────────────────────────
// RENDER DISPATCH
// ─────────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('main');
  if (!intelData) {
    el.innerHTML = '<div class="empty">Connecting to server at ' + esc(serverUrl) + '...</div>';
    return;
  }
  switch (currentTab) {
    case 'pipeline': el.innerHTML = renderPipeline(); break;
    case 'queue':    el.innerHTML = renderQueue(); break;
    case 'batching': el.innerHTML = renderBatching(); break;
  }
}

// ─────────────────────────────────────────────────────────────────
// TAB 1: PIPELINE
// ─────────────────────────────────────────────────────────────────
function renderPipeline() {
  const d = intelData;
  const q = d.queue || {};
  const rec = d.recommendation || {};
  const ovens = d.ovens || {};
  const bySubStage = q.bySubStage || {};
  const byType = q.byType || [];
  const coaterPlan = rec.coaterPlan || [];
  const runningRacks = ovens.racksRunning || [];

  // Merge live oven timer data if available
  const liveTimers = (ovenData && ovenData.timers) ? ovenData.timers : {};

  // KPI row
  let html = '<div class="kpi-row">';
  html += kpi(q.total || 0, 'QUEUE', 'Jobs in coating stage', 'var(--teal)');
  html += kpi(bySubStage.IN_COATER || 0, 'IN COATER', 'Currently coating', 'var(--blue)');
  html += kpi(bySubStage.IN_OVEN || 0, 'IN OVEN', ovens.racksInUse + ' racks active', 'var(--amber)');
  html += kpi(d.stats ? d.stats.todayCoatingRuns : 0, 'DONE TODAY', 'Coating runs completed', 'var(--green)');

  // Action badge as KPI
  const action = rec.action || 'WAIT';
  const reason = rec.reason || '';
  html += '<div class="kpi" style="border-color:' + (action === 'RUN NOW' ? 'var(--green)' : action === 'RUN PARTIAL' ? 'var(--blue)' : 'var(--amber)') + '">';
  html += '<span class="action-badge ' + actionClass(action) + '">' + esc(action) + '</span>';
  html += '<span class="kpi-lbl">BATCH ACTION</span>';
  html += '<span class="kpi-sub">' + esc(reason) + '</span>';
  html += '</div>';
  html += '</div>';

  // Summary bar
  if (d.recommendation && d.recommendation.reason) {
    html += '<div class="summary-bar">' + esc(d.recommendation.reason);
    if (d.upstream && d.upstream.surfacing) {
      html += ' &mdash; ' + d.upstream.surfacing.count + ' jobs in surfacing (~' + d.upstream.surfacing.etaMin + 'min ETA)';
    }
    html += '</div>';
  }

  // Coater cards
  html += '<div class="card-title">COATER PLAN <span class="card-badge">' + (rec.overallFillPct || 0) + '% OVERALL FILL</span></div>';
  html += '<div class="three-col">';
  for (const c of coaterPlan) {
    const pct = c.fillPct || 0;
    const isActive = pct > 0;
    html += '<div class="coater-card' + (isActive ? ' active' : '') + '">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between">';
    html += '<span class="coater-name">' + esc(c.name) + '</span>';
    html += '<span class="coater-cap">' + c.lensCapacity + ' lens cap</span>';
    html += '</div>';
    html += '<div class="coater-fill-wrap"><div class="coater-fill ' + fillClass(pct) + '" style="width:' + Math.min(pct, 100) + '%"></div></div>';
    html += '<div class="coater-stats">';
    html += '<div class="coater-stat"><div class="coater-stat-val">' + (c.fill || 0) + '</div><div class="coater-stat-lbl">LENSES</div></div>';
    html += '<div class="coater-stat"><div class="coater-stat-val">' + (c.orders || 0) + '</div><div class="coater-stat-lbl">ORDERS</div></div>';
    html += '<div class="coater-stat"><div class="coater-stat-val">' + pct + '%</div><div class="coater-stat-lbl">FILL</div></div>';
    html += '</div>';
    html += '</div>';
  }
  html += '</div>';

  // Oven rack grid
  html += '<div class="card-title">OVEN RACKS <span class="card-badge">';
  html += (ovens.racksInUse || 0) + ' RUNNING / ' + (ovens.racksAvailable || 0) + ' AVAILABLE';
  html += '</span></div>';

  if (runningRacks.length === 0 && Object.keys(liveTimers).length === 0) {
    html += '<div class="empty">No oven racks currently running</div>';
  } else {
    // Build combined rack list: prefer live timer data, fall back to intelligence data
    const rackMap = new Map();

    // First add intelligence running racks
    for (const r of runningRacks) {
      const key = (r.ovenId || '') + '::' + (r.rackLabel || r.rackIndex);
      rackMap.set(key, r);
    }

    // Overlay live timer data (more accurate elapsed times)
    for (const [key, timer] of Object.entries(liveTimers)) {
      if (timer.state === 'running' || timer.state === 'paused') {
        const existing = rackMap.get(key);
        rackMap.set(key, {
          ovenId: timer.ovenName || timer.ovenId || (existing ? existing.ovenId : ''),
          rackLabel: timer.rackLabel || (existing ? existing.rackLabel : key),
          coating: timer.coating || (existing ? existing.coating : 'AR'),
          state: timer.state,
          elapsed: timer.elapsed || 0,
          target: timer.target || 10800,
          remainingSec: Math.max(0, (timer.target || 10800) - (timer.elapsed || 0)),
          remainingMin: Math.round(Math.max(0, (timer.target || 10800) - (timer.elapsed || 0)) / 60),
        });
      }
    }

    const racks = Array.from(rackMap.values()).sort((a, b) => (a.remainingSec || 0) - (b.remainingSec || 0));
    html += '<div class="rack-grid">';
    for (const r of racks) {
      const pct = r.target > 0 ? Math.min(100, Math.round((r.elapsed / r.target) * 100)) : 0;
      const remaining = r.remainingSec || 0;
      const barClass = remaining <= 0 ? 'done' : remaining < 600 ? 'warn' : '';
      html += '<div class="rack-tile ' + (r.state || 'running') + '">';
      html += '<div class="rack-top">';
      html += '<span class="rack-id">' + esc(r.ovenId) + ' ' + esc(r.rackLabel) + '</span>';
      html += '<span class="rack-state ' + (r.state || 'running') + '">' + (r.state || 'RUNNING').toUpperCase() + '</span>';
      html += '</div>';
      html += '<div class="rack-coating" style="color:' + coatingColor(r.coating) + '">' + esc(r.coating || 'AR') + '</div>';
      html += '<div class="rack-time">' + fmtTime(r.elapsed) + ' / ' + fmtTime(r.target) + '</div>';
      html += '<div class="rack-bar-wrap"><div class="rack-bar ' + barClass + '" style="width:' + pct + '%"></div></div>';
      html += '<div style="font-family:var(--mono);font-size:9px;color:var(--dimmer);">' + fmtMin(r.remainingMin) + ' remaining</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  // Coating type breakdown
  if (byType.length > 0) {
    html += '<div class="card-title">QUEUE BY COATING TYPE</div>';
    html += '<div class="type-chips">';
    for (const t of byType) {
      html += '<div class="type-chip">';
      html += '<div class="type-chip-name" style="color:' + coatingColor(t.type) + '">' + esc(t.type) + '</div>';
      html += '<div class="type-chip-count">' + t.count + '</div>';
      html += '<div class="type-chip-lbl">JOBS' + (t.rushCount > 0 ? ' (' + t.rushCount + ' RUSH)' : '') + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  return html;
}

function kpi(val, label, sub, color) {
  return '<div class="kpi"><span class="kpi-val" style="color:' + color + '">' + val + '</span>'
    + '<span class="kpi-lbl">' + esc(label) + '</span>'
    + '<span class="kpi-sub">' + esc(sub) + '</span></div>';
}

// ─────────────────────────────────────────────────────────────────
// TAB 2: QUEUE
// ─────────────────────────────────────────────────────────────────
function renderQueue() {
  const d = intelData;
  const q = d.queue || {};
  const jobs = q.jobs || [];

  let html = '<div class="card-title">COATING QUEUE <span class="card-badge">';
  html += jobs.length + ' JOBS';
  if (q.rushCount > 0) html += ' / ' + q.rushCount + ' RUSH';
  html += '</span></div>';

  // Station breakdown row
  const byStation = q.byStation || {};
  const stationKeys = Object.keys(byStation);
  if (stationKeys.length > 0) {
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">';
    for (const stn of stationKeys) {
      html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;'
        + 'padding:4px 10px;font-family:var(--mono);font-size:10px;">';
      html += '<span style="color:var(--dim)">' + esc(stn) + '</span> ';
      html += '<span style="color:var(--text);font-weight:700">' + byStation[stn] + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  if (jobs.length === 0) {
    html += '<div class="empty">No jobs in coating queue</div>';
    return html;
  }

  // Column headers
  html += '<div style="display:flex;align-items:center;gap:10px;padding:4px 12px;'
    + 'font-family:var(--mono);font-size:8px;color:var(--dimmer);letter-spacing:1px;">';
  html += '<span style="min-width:80px">JOB</span>';
  html += '<span style="min-width:70px">COATING</span>';
  html += '<span style="min-width:50px">MATERIAL</span>';
  html += '<span style="min-width:60px">LENS</span>';
  html += '<span style="min-width:70px">SUB-STAGE</span>';
  html += '<span style="flex:1"></span>';
  html += '<span style="min-width:60px;text-align:right">WAIT</span>';
  html += '<span style="min-width:50px"></span>';
  html += '</div>';

  html += '<div class="queue-list" style="max-height:calc(100vh - 240px);overflow-y:auto;">';
  for (const j of jobs) {
    const isRush = j.rush;
    html += '<div class="queue-row' + (isRush ? ' rush' : '') + '">';
    html += '<span class="q-job">' + esc(j.jobId) + '</span>';
    html += '<span class="q-coating" style="color:' + coatingColor(j.coating) + '">' + esc(j.coating || 'AR') + '</span>';
    html += '<span class="q-material">' + esc(j.lensMat || '--') + '</span>';
    html += '<span class="q-lens">' + esc(j.lensType || '--') + '</span>';

    // Sub-stage badge
    const ss = j.subStage || 'QUEUE';
    let ssClass = 'qs-queue';
    if (ss === 'IN_COATER') ssClass = 'qs-coater';
    else if (ss === 'IN_OVEN') ssClass = 'qs-oven';
    else if (ss === 'COAT_QC') ssClass = 'qs-qc';
    html += '<span class="q-substage ' + ssClass + '">' + ss.replace('_', ' ') + '</span>';

    html += '<span style="flex:1"></span>';
    html += '<span class="q-wait">' + fmtMin(j.waitMin) + '</span>';
    html += isRush ? '<span class="q-rush">RUSH</span>' : '<span style="min-width:50px"></span>';
    html += '</div>';
  }
  html += '</div>';

  return html;
}

// ─────────────────────────────────────────────────────────────────
// TAB 3: BATCHING
// ─────────────────────────────────────────────────────────────────
function renderBatching() {
  const d = intelData;
  const rec = d.recommendation || {};
  const batches = rec.batchSuggestions || [];

  let html = '<div class="card-title">BATCH SUGGESTIONS <span class="card-badge">';
  html += batches.length + ' GROUPS';
  html += '</span></div>';

  // Overall recommendation bar
  const action = rec.action || 'WAIT';
  html += '<div class="summary-bar" style="display:flex;align-items:center;gap:12px;">';
  html += '<span class="action-badge ' + actionClass(action) + '">' + esc(action) + '</span>';
  html += '<span>' + esc(rec.reason || '') + '</span>';
  html += '<span style="margin-left:auto;color:var(--teal);font-weight:700;">'
    + (rec.lensCount || 0) + ' lenses / ' + (rec.jobCount || 0) + ' jobs total</span>';
  html += '</div>';

  if (batches.length === 0) {
    html += '<div class="empty">No batch groups available -- queue is empty</div>';
    return html;
  }

  html += '<div style="display:flex;flex-direction:column;gap:12px;">';
  for (const b of batches) {
    const isReady = b.ready;
    html += '<div class="batch-card' + (isReady ? ' ready' : '') + '">';

    // Header row
    html += '<div class="batch-header">';
    html += '<div style="display:flex;align-items:center;gap:10px;">';
    html += '<span class="batch-type" style="color:' + coatingColor(b.coatingType) + '">' + esc(b.coatingType) + '</span>';
    html += '<span class="batch-material">' + esc(b.material) + '</span>';
    if (isReady) {
      html += '<span class="batch-ready-badge">READY</span>';
    } else {
      html += '<span class="batch-wait-badge">ACCUMULATING</span>';
    }
    if (b.rushCount > 0) {
      html += '<span class="q-rush">' + b.rushCount + ' RUSH</span>';
    }
    html += '</div>';
    html += '<span class="batch-coater">Suggested: <strong>' + esc(b.suggestedCoater) + '</strong></span>';
    html += '</div>';

    // Stats grid
    html += '<div class="batch-stats">';
    html += batchStat(b.jobCount, 'JOBS');
    html += batchStat(b.lensCount, 'LENSES');
    html += batchStat(b.fillPct + '%', 'FILL');
    html += batchStat(b.avgWaitMin != null ? fmtMin(b.avgWaitMin) : '--', 'AVG WAIT');
    html += '</div>';

    // Fill bar
    html += '<div style="display:flex;align-items:center;gap:10px;">';
    html += '<div class="batch-fill-wrap" style="flex:1"><div class="batch-fill' + (isReady ? ' ready' : '') + '" style="width:' + Math.min(b.fillPct, 100) + '%"></div></div>';
    html += '<span style="font-family:var(--mono);font-size:10px;color:var(--dim)">' + b.fillPct + '% of ' + esc(b.suggestedCoater) + '</span>';
    html += '</div>';

    // Lens type breakdown if available
    if (b.lensTypeBreakdown && Object.keys(b.lensTypeBreakdown).length > 0) {
      html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
      for (const [lt, count] of Object.entries(b.lensTypeBreakdown)) {
        const label = lt === 'P' ? 'Progressive' : lt === 'S' ? 'Single Vision' : lt === 'B' ? 'Bifocal' : lt;
        html += '<span style="font-family:var(--mono);font-size:9px;color:var(--dim);'
          + 'background:var(--card);border:1px solid var(--border);border-radius:4px;padding:2px 6px;">'
          + esc(label) + ': ' + count + '</span>';
      }
      html += '</div>';
    }

    // ETA to full
    if (b.etaToFullMin != null) {
      html += '<div style="font-family:var(--mono);font-size:9px;color:var(--dimmer);">'
        + 'Estimated ' + fmtMin(b.etaToFullMin) + ' to fill ' + esc(b.suggestedCoater)
        + ' (max wait: ' + fmtMin(b.maxWaitMin) + ')</div>';
    }

    html += '</div>';
  }
  html += '</div>';

  return html;
}

function batchStat(val, label) {
  return '<div class="batch-stat"><div class="batch-stat-val">' + val + '</div>'
    + '<div class="batch-stat-lbl">' + esc(label) + '</div></div>';
}

// ─────────────────────────────────────────────────────────────────
// SETUP MODAL
// ─────────────────────────────────────────────────────────────────
function openSetup() {
  const m = document.getElementById('modal');
  document.getElementById('mTitle').textContent = 'COATING DASHBOARD SETUP';
  document.getElementById('mBody').innerHTML =
    '<div class="m-field"><label>SERVER URL</label>'
    + '<input class="m-inp" id="cfgServer" value="' + esc(serverUrl) + '" placeholder="http://localhost:3002"/>'
    + '</div>';
  document.getElementById('mBtns').innerHTML =
    '<button style="background:var(--border);color:var(--text)" onclick="closeModal()">Cancel</button>'
    + '<button style="background:var(--teal);color:#000" onclick="saveSetup()">Save</button>';
  m.style.display = 'flex';
}

function saveSetup() {
  serverUrl = document.getElementById('cfgServer').value.replace(/\/+$/, '') || 'http://localhost:3002';
  cfg.serverUrl = serverUrl;
  localStorage.setItem('coat_cfg', JSON.stringify(cfg));
  closeModal();
  showToast('Config saved', 'ok');
  startPolling();
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

// Close modal on background click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─────────────────────────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(function() { t.remove(); }, 2500);
}

// ─────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────
startPolling();
</script>
</body>
</html>
